<!DOCTYPE html>
<html>
<head>
    <title>Dashboard - Smart Expense</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 20px; background: #f8f9fa; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); max-width: 950px; margin: auto; }
        .header-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 2px solid #eee; padding-bottom: 15px; }
        .main-content { display: flex; gap: 30px; flex-wrap: wrap; margin-bottom: 30px; }
        .form-side { flex: 1; min-width: 300px; }
        .chart-side { flex: 1; min-width: 300px; display: flex; justify-content: center; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { background: #28a745; color: white; padding: 12px; border: none; border-radius: 8px; width: 100%; cursor: pointer; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
        .logout-btn { color: #dc3545; text-decoration: none; font-weight: bold; font-size: 0.9em; }
    </style>
</head>
<body>
    <div class="card">
        <div class="header-bar">
            <h2>💰 Total: {{ currency }} {{ total }}</h2>
            <div>
                <small>User: {{ session['user'] }}</small> | 
                <a href="/logout" class="logout-btn">Logout</a>
            </div>
        </div>

        <div class="main-content">
            <div class="form-side">
                <h3>Add New Expense</h3>
                <form action="/add" method="POST">
                    <input type="number" step="0.01" name="amount" placeholder="Amount" required>
                    <select name="category" required>
                        <option value="" disabled selected>Choose Category</option>
                        {% for cat in categories %}
                        <option value="{{ cat }}">{{ cat }}</option>
                        {% endfor %}
                    </select>
                    <input type="text" name="note" placeholder="Note (Optional)">
                    <button type="submit">Save Expense</button>
                </form>
            </div>

            <div class="chart-side">
                <div style="width: 100%; max-width: 280px;">
                    <canvas id="myChart"></canvas>
                </div>
            </div>
        </div>

        <hr>

        <h3>Recent Expenses</h3>
        <table>
            <thead>
                <tr style="background: #f8f9fa;">
                    <th>Category</th>
                    <th>Amount</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody>
                {% for exp in expenses %}
                <tr>
                    <td>{{ exp.category }}<br><small style="color: gray;">{{ exp.note }}</small></td>
                    <td><b>{{ currency }} {{ exp.amount }}</b></td>
                    <td><a href="/delete/{{ loop.index0 }}" style="color: red; text-decoration: none;">[X]</a></td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const ctx = document.getElementById('myChart').getContext('2d');
           var labels = JSON.parse('{{ labels | tojson | safe }}');
           var values = JSON.parse('{{ values | tojson | safe }}');

            if (labels.length > 0) {
                new Chart(ctx, {
                    type: 'pie',
                    data: {
                        labels: labels,
                        datasets: [{
                            data: values,
                            backgroundColor: ['#4e73df', '#1cc88a', '#36b9cc', '#f6c23e', '#e74a3b', '#858796']
                        }]
                    },
                    options: { responsive: true, plugins: { legend: { position: 'bottom' } } }
                });
            }
        });
    </script>
</body>
</html>
