<!DOCTYPE html>
<html>
<head>
    <title>Login - Smart Expense</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: white; padding: 40px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 320px; text-align: center; }
        h2 { color: #1a1a1a; margin-bottom: 10px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; background: #007bff; color: white; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.3s; }
        button:hover { background: #0056b3; }
        .alert { color: #dc3545; font-size: 0.9em; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="login-card">
        <h2>📱 Login</h2>
        <p style="color: #666;">Enter Mobile & OTP (1234)</p>
        
        {% with messages = get_flashed_messages() %}
          {% if messages %}
            {% for message in messages %}<div class="alert">{{ message }}</div>{% endfor %}
          {% endif %}
        {% endwith %}

        <form method="POST">
            <input type="text" name="phone" placeholder="Mobile Number" required>
            <input type="password" name="otp" placeholder="Enter OTP (1234)" required>
            <button type="submit">Login Now</button>
        </form>
    </div>
</body>
</html>
